server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    autoindex off;

    location ~ ^/v[0-9]+/ {
        limit_except GET HEAD { deny all; }
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        return 404;
    }
}
