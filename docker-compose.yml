services:
  metadata-cdn:
    image: nginx:1.29-alpine
    restart: unless-stopped
    volumes:
      - ./logos:/usr/share/nginx/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy}
